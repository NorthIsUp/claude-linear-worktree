name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: claude-lwt-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: claude-lwt-aarch64-linux
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: claude-lwt-aarch64-darwin

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Install pinned tools
        run: mise install

      - name: Add cross-compilation target
        run: mise exec -- rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: mise exec -- cargo build --release --target ${{ matrix.target }}

      - name: Package artifact
        run: |
          ARCHIVE_DIR="${{ matrix.artifact }}"
          mkdir -p "$ARCHIVE_DIR"
          cp target/${{ matrix.target }}/release/claude-lwt "$ARCHIVE_DIR/claude-lwt"
          ln -sf claude-lwt "$ARCHIVE_DIR/clw"
          tar czf "$ARCHIVE_DIR.tar.gz" -C "$ARCHIVE_DIR" .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums
        run: |
          cd artifacts
          sha256sum claude-lwt-* > checksums-sha256.txt

      - name: Extract changelog section
        id: changelog
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo "No CHANGELOG.md; skipping release notes extraction"
            {
              echo 'notes<<EOF'
              echo ''
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          version="${GITHUB_REF#refs/tags/v}"
          # Extract the [version] section from CHANGELOG.md (stops at next ## heading).
          notes=$(awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md)
          if [ -z "$notes" ]; then
            echo "No changelog entry found for v${version}; using auto-generated notes only."
            echo "has_notes=false" >> $GITHUB_OUTPUT
          else
            {
              echo 'notes<<CHANGELOG_EOF'
              echo "$notes"
              echo 'CHANGELOG_EOF'
            } >> $GITHUB_OUTPUT
            echo "has_notes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.has_notes == 'true' && steps.changelog.outputs.notes || '' }}
          generate_release_notes: true
          files: |
            artifacts/claude-lwt-*
            artifacts/checksums-sha256.txt
