name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          experimental: true
      - name: Install pinned tools
        run: mise install
      - name: Install clippy + rustfmt
        run: mise exec -- rustup component add clippy rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: mise exec -- cargo test
      - run: mise exec -- cargo clippy -- -D warnings
      - run: mise exec -- cargo fmt --all -- --check
